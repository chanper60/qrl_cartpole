# Config for the HEAAgent defined in examples/03_new_quantum_agent.py
#
# To use this config with train.py you must first register HEAAgent by
# importing the example module, or add it to AGENT_REGISTRY in agents/__init__.py.
#
# Params: n_layers × n_qubits (RY) + n_qubits (w_input) + 2 (w_output)
#         = 3 × 4 + 4 + 2 = 18 params

agent_type: "hea"

n_qubits: 4
n_layers: 3

# ── Exploration ────────────────────────────────────────────────────────────────
start_epsilon: 1.0
end_epsilon: 0.01
exploration_fraction: 0.1

# ── Training loop ─────────────────────────────────────────────────────────────
total_timesteps: 150000
learning_starts: 10000
train_frequency: 10
checkpoint_frequency: 50000

# ── Replay buffer ─────────────────────────────────────────────────────────────
buffer_size: 10000
batch_size: 16

# ── Q-learning ─────────────────────────────────────────────────────────────────
gamma: 0.99
tau: 1.0
target_network_frequency: 30

# ── Optimizer ─────────────────────────────────────────────────────────────────
learning_rate: 0.001
