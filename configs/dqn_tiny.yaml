agent_type: "dqn"

# Parameter-matched classical baseline: 44 params vs QDQN's 46
# Linear(4→6) + ReLU + Linear(6→2) = (4×6+6) + (6×2+2) = 30 + 14 = 44 params
hidden_dims: [6]

# ── Exploration ────────────────────────────────────────────────────────────────
start_epsilon: 1.0
end_epsilon: 0.01
exploration_fraction: 0.1    # matched to qdqn_skolik for fair comparison

# ── Training loop ─────────────────────────────────────────────────────────────
total_timesteps: 200000
learning_starts: 10000
train_frequency: 10
checkpoint_frequency: 50000

# ── Replay buffer ─────────────────────────────────────────────────────────────
buffer_size: 10000
batch_size: 128

# ── Q-learning ────────────────────────────────────────────────────────────────
gamma: 0.99
tau: 1.0
target_network_frequency: 500

# ── Optimizer ─────────────────────────────────────────────────────────────────
learning_rate: 2.5e-4
