agent_type: "dqn"

# ~1000-param classical baseline for scaling sweep
# Linear(4→142) + ReLU + Linear(142→2) = (4×142+142) + (142×2+2) = 710 + 286 = 996 params
hidden_dims: [142]

# ── Exploration ────────────────────────────────────────────────────────────────
start_epsilon: 1.0
end_epsilon: 0.01
exploration_fraction: 0.1

# ── Training loop ─────────────────────────────────────────────────────────────
total_timesteps: 200000
learning_starts: 10000
train_frequency: 10
checkpoint_frequency: 50000

# ── Replay buffer ─────────────────────────────────────────────────────────────
buffer_size: 10000
batch_size: 128

# ── Q-learning ────────────────────────────────────────────────────────────────
gamma: 0.99
tau: 1.0
target_network_frequency: 500

# ── Optimizer ─────────────────────────────────────────────────────────────────
learning_rate: 2.5e-4
