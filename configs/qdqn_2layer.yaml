agent_type: "qdqn_skolik"

# Shallow ansatz ablation: 2 layers instead of 5
# Params: 2×4×2 (VQC) + 4 (w_input) + 2 (w_output) = 22
# vs Skolik A1: 46 params — tests parameter efficiency
n_qubits: 4
n_layers: 2

# ── Exploration ────────────────────────────────────────────────────────────────
start_epsilon: 1.0
end_epsilon: 0.01
exploration_fraction: 0.1

# ── Training loop ─────────────────────────────────────────────────────────────
total_timesteps: 150000
learning_starts: 10000
train_frequency: 10
checkpoint_frequency: 50000

# ── Replay buffer ─────────────────────────────────────────────────────────────
buffer_size: 10000
batch_size: 16

# ── Q-learning ─────────────────────────────────────────────────────────────────
gamma: 0.99
tau: 1.0
target_network_frequency: 30

# ── Optimizer: RMSprop with separate LRs (Skolik Table 2) ─────────────────────
learning_rate: 0.001
learning_rate_input: 0.01
learning_rate_output: 0.1
